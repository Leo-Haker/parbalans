name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: minanvandare
          POSTGRES_PASSWORD: balans123
          POSTGRES_DB: spliteven
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Create database schema
        run: |
          PGPASSWORD=balans123 psql -h localhost -U minanvandare -d spliteven -f backend/sql/schema.sql

      - name: Run tests
        working-directory: ./backend
        run: ./mvnw test