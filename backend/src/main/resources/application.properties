spring.application.name=parbalans

# Databasanslutning
spring.datasource.url=jdbc:postgresql://localhost:5432/spliteven
spring.datasource.username=minanvandare
spring.datasource.password=balans123

# JPA/Hibernate-inställningar
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Explicit driver och dialekt - undviker Hibernate-fel vid JDBC-metadata-avläsning
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect